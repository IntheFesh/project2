# LIBERO-Plus's RELEASED perturbation training data (RLDS / LeRobot) instead of synthetic aug.
#
# See report/technical_report.md section 8 (Condition-C design fork). Leave disabled until/unless
# the real perturbation training data is wired in.
enabled: false
source: libero_plus_perturbation_trajectories   # TODO(verify): exact RLDS/LeRobot dataset id/name
