# Evaluation matrix -- LIBERO-Plus task-SELECTION semantics.
#
# The eval unit is a PRE-BUILT LIBERO-Plus task instance, run ONCE (not "N inits per base task").
benchmark: libero
num_trials_per_task: 1          # LIBERO-Plus convention (its README: change 50 -> 1)

# Per (category, level) cell, sample this many pre-built task IDs from task_classification.json.
instances_per_cell: 20
clean_instances: 20             # clean/original LIBERO task instances per seed (0 = skip clean)

# Perturbation families (mapped to LIBERO-Plus categories in perturb/libero_plus_constants.py).
trained_families: [viewpoint, lighting, texture, noise]  # Condition-C augmentation -> in-dist
held_out_families: [layout]     # never augmented -> evaluated as held-out generalization (WS5)
levels: [2, 4]                  # difficulty_level subset to start (full scheme is 1..5)

# Seeds. NOTE: a "seed" for B/C is an INDEPENDENT LoRA training run (training-init variance),
# each evaluated on the SAME task-ID set. The collapse curve (A) needs only 1 seed.
seeds_comparison: [0, 1, 2]
seeds_collapse: [0]

# Paired comparison: A/B/C are run on the SAME set of task IDs; McNemar / paired bootstrap then
# operate on the matched (b_i, c_i) outcomes per task_id (NOT resampled init states).
paired_by: task_id

max_steps_per_episode: 600      # TODO(verify per LIBERO task horizon)
workers: 1                      # single GPU; reserved for a possible 2nd card
device: cuda
